apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-consumer-config
  namespace: kafka
  labels:
    app: kafka-consumer
    component: config
data:
  # Kafka headless service endpoints for the StatefulSet — update if using a different broker setup
  KAFKA_BOOTSTRAP_SERVERS: "kafka-0.kafka-headless.kafka.svc.cluster.local:9092,kafka-1.kafka-headless.kafka.svc.cluster.local:9092,kafka-2.kafka-headless.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC_METRICS: "order-metrics"
  KAFKA_CONSUMER_GROUP: "metrics-logger"
