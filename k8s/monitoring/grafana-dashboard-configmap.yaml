# Grafana dashboard ConfigMap for the VVP3 Autopilot Showcase.
#
# The dashboard JSON is mounted by kube-prometheus-stack via the
# grafana.dashboardsConfigMaps setting (key "autopilot" → this ConfigMap).
# Grafana loads it from /var/lib/grafana/dashboards/autopilot/ at startup
# and refreshes it every 10 seconds (updateIntervalSeconds in the provider).
#
# Dashboard features:
#   - 5-second auto-refresh for near-real-time scaling visibility
#   - 13 panels across 5 thematic rows
#   - Datasource template variable — works without hard-coding a UID
#   - Step interpolation on the TaskManager count panel to show discrete jumps

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-autopilot-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  autopilot-showcase.json: |
    {
      "title": "VVP3 Autopilot Showcase",
      "uid": "autopilot-showcase",
      "description": "Real-time view of Kafka inbound traffic, Flink processing health, and VVP3 Autopilot scale-up/down behaviour.",
      "tags": ["vvp3", "flink", "kafka", "autopilot"],
      "refresh": "5s",
      "schemaVersion": 38,
      "version": 1,
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "timezone": "browser",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "datasource",
            "label": "Datasource",
            "type": "datasource",
            "pluginId": "prometheus",
            "query": "prometheus",
            "refresh": 1,
            "includeAll": false,
            "multi": false,
            "current": {}
          }
        ]
      },
      "panels": [

        {
          "id": 600,
          "type": "row",
          "title": "Producer",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 }
        },

        {
          "id": 14,
          "title": "Send Rate",
          "type": "timeseries",
          "description": "Actual message send rate from the Kafka producer client (kafka.producer.record.send.rate). Reflects the true throughput hitting the broker, including batching effects.",
          "gridPos": { "x": 0, "y": 1, "w": 8, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "expr": "kafka_producer_record_send_rate{application=\"kafka-producer\"}",
              "legendFormat": "send rate (msg/s)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "mps",
              "color": { "mode": "fixed", "fixedColor": "orange" },
              "custom": { "lineWidth": 2, "fillOpacity": 10, "spanNulls": false }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },

        {
          "id": 15,
          "title": "Current / Base Throughput",
          "type": "timeseries",
          "description": "Target rate currently set on the rate limiter (current) vs. the configured base rate. During a peak the current rate ramps up to base × multiplier.",
          "gridPos": { "x": 8, "y": 1, "w": 8, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "expr": "producer_throughput_current{application=\"kafka-producer\"}",
              "legendFormat": "current (msg/s)"
            },
            {
              "refId": "B",
              "expr": "producer_throughput_base{application=\"kafka-producer\"}",
              "legendFormat": "base (msg/s)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "mps",
              "custom": { "lineWidth": 2, "fillOpacity": 8, "spanNulls": false }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "base (msg/s)" },
                "properties": [
                  { "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [8, 4] } },
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "gray" } }
                ]
              }
            ]
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },

        {
          "id": 16,
          "title": "Peak Active",
          "type": "stat",
          "description": "1 when a peak simulation is running, 0 otherwise.",
          "gridPos": { "x": 16, "y": 1, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "expr": "producer_peak_active{application=\"kafka-producer\"}",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "mappings": [
                { "type": "value", "options": { "0": { "text": "INACTIVE", "color": "green" }, "1": { "text": "PEAK", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },

        {
          "id": 17,
          "title": "Messages Produced",
          "type": "stat",
          "description": "Cumulative messages successfully sent since the pod started.",
          "gridPos": { "x": 20, "y": 1, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "expr": "producer_messages_produced{application=\"kafka-producer\"}",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "decimals": 0
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center"
          }
        },

        {
          "id": 18,
          "title": "Error Rate",
          "type": "timeseries",
          "description": "Kafka producer client error rate (kafka.producer.record.error.rate). Any sustained non-zero value indicates broker connectivity or serialisation issues.",
          "gridPos": { "x": 16, "y": 5, "w": 4, "h": 3 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "expr": "kafka_producer_record_error_rate{application=\"kafka-producer\"}",
              "legendFormat": "errors/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "mps",
              "color": { "mode": "fixed", "fixedColor": "red" },
              "custom": { "lineWidth": 2, "fillOpacity": 20, "spanNulls": false },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.1 }]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },

        {
          "id": 19,
          "title": "Request Latency",
          "type": "timeseries",
          "description": "Average round-trip latency for Kafka produce requests (kafka.producer.request.latency.avg). Spikes here correlate with broker load or network congestion.",
          "gridPos": { "x": 20, "y": 5, "w": 4, "h": 3 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "expr": "kafka_producer_request_latency_avg{application=\"kafka-producer\"}",
              "legendFormat": "avg latency (ms)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "color": { "mode": "fixed", "fixedColor": "yellow" },
              "custom": { "lineWidth": 2, "fillOpacity": 8, "spanNulls": false }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },

        {
          "id": 100,
          "type": "row",
          "title": "Kafka Inbound Traffic",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 1 }
        },

        {
          "id": 1,
          "title": "Orders Inbound Rate",
          "type": "timeseries",
          "description": "Message ingest rate for the `orders` Kafka topic (1-min rolling avg from JMX). A spike here should trigger Autopilot scale-up.",
          "gridPos": { "x": 0, "y": 9, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(kafka_server_brokertopicmetrics_messagesin_oneminuterate{topic=\"orders\"}[1m]))",
              "legendFormat": "messages/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "mps",
              "color": { "mode": "fixed", "fixedColor": "orange" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "none",
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1000 },
                  { "color": "red", "value": 4000 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },

        {
          "id": 2,
          "title": "Flink Consumer Lag",
          "type": "timeseries",
          "description": "Total unprocessed messages in the `orders` topic across all partitions. Rising lag means Flink is falling behind; Autopilot should respond with scale-up.",
          "gridPos": { "x": 12, "y": 9, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(kafka_server_fetcherlagmetrics_consumerlag{topic=\"orders\"})",
              "legendFormat": "lag (messages)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "red" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "none",
                "spanNulls": false
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5000 },
                  { "color": "red", "value": 50000 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },

        {
          "id": 200,
          "type": "row",
          "title": "Flink Processing",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 17, "w": 24, "h": 1 }
        },

        {
          "id": 3,
          "title": "Records Processed / sec",
          "type": "timeseries",
          "description": "Sum of numRecordsInPerSecond across all TaskManagers. Compare with the inbound rate to see if Flink is keeping up.",
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(rate(flink_taskmanager_job_task_numRecordsInPerSecond[30s]))",
              "legendFormat": "records/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "rps",
              "color": { "mode": "fixed", "fixedColor": "green" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "none",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },

        {
          "id": 4,
          "title": "Backpressure Ratio",
          "type": "gauge",
          "description": "Average fraction of time tasks are back-pressured (0–100 %). Sustained values above 25 % indicate Autopilot should scale out.",
          "gridPos": { "x": 12, "y": 18, "w": 6, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "avg(flink_taskmanager_job_task_isBackPressured) * 100",
              "legendFormat": "backpressure %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 25 },
                  { "color": "red", "value": 75 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "showThresholdLabels": true,
            "showThresholdMarkers": true
          }
        },

        {
          "id": 5,
          "title": "Checkpoint Duration",
          "type": "timeseries",
          "description": "Duration of the last completed checkpoint in milliseconds. Spikes may indicate state backend pressure or GC pauses during scaling.",
          "gridPos": { "x": 18, "y": 18, "w": 6, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "flink_jobmanager_job_lastCheckpointDuration",
              "legendFormat": "last checkpoint (ms)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5,
                "gradientMode": "none",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },

        {
          "id": 300,
          "type": "row",
          "title": "Autopilot Scaling",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 26, "w": 24, "h": 1 }
        },

        {
          "id": 6,
          "title": "Active TaskManagers",
          "type": "timeseries",
          "description": "Number of ready Flink TaskManager pods in the `vvp-deploy` namespace. Step interpolation makes scale-up/down events clearly visible as discrete jumps.",
          "gridPos": { "x": 0, "y": 27, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "count(kube_pod_status_ready{namespace=\"vvp-deploy\",condition=\"true\",pod=~\".*taskmanager.*\"} == 1) or vector(0)",
              "legendFormat": "TaskManagers"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "custom": {
                "lineWidth": 3,
                "fillOpacity": 15,
                "gradientMode": "none",
                "spanNulls": false,
                "lineInterpolation": "stepAfter"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },

        {
          "id": 7,
          "title": "TaskManager JVM Heap Used",
          "type": "timeseries",
          "description": "JVM heap used per TaskManager pod (HashMapStateBackend stores state on heap). Growing heap across fewer TMs after scale-down indicates redistributed state. Note: numBytesInLocalStateTotal is only emitted by RocksDB; for HashMapStateBackend, JVM heap is the correct proxy.",
          "gridPos": { "x": 12, "y": 27, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (pod) (flink_taskmanager_Status_JVM_Memory_Heap_Used{namespace=\"vvp-deploy\"})",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "none",
                "spanNulls": false,
                "stacking": { "mode": "normal", "group": "A" }
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"] }
          }
        },

        {
          "id": 400,
          "type": "row",
          "title": "Resource Utilisation",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 35, "w": 24, "h": 1 }
        },

        {
          "id": 8,
          "title": "CPU Usage by Pod",
          "type": "timeseries",
          "description": "CPU consumption in millicores per TM pod. Helps confirm Autopilot triggers scaling at the right CPU threshold.",
          "gridPos": { "x": 0, "y": 36, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"vvp-deploy\",container!=\"\",pod=~\".*taskmanager.*\"}[1m])) * 1000",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 5,
                "gradientMode": "none",
                "spanNulls": false
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "mean"] }
          }
        },

        {
          "id": 9,
          "title": "Memory Usage by Pod",
          "type": "timeseries",
          "description": "Working-set memory in MiB per TM pod. Useful for spotting memory pressure before OOM events.",
          "gridPos": { "x": 8, "y": 36, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"vvp-deploy\",container!=\"\",pod=~\".*taskmanager.*\"}) / 1024 / 1024",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": {
                "lineWidth": 1,
                "fillOpacity": 5,
                "gradientMode": "none",
                "spanNulls": false
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "mean"] }
          }
        },

        {
          "id": 10,
          "title": "Pod Count Over Time",
          "type": "timeseries",
          "description": "Number of pods in each phase (Running / Pending) in the `vvp-deploy` namespace. Pending pods during scale-up confirm Autopilot is requesting new capacity.",
          "gridPos": { "x": 16, "y": 36, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "count by (phase) (kube_pod_status_phase{namespace=\"vvp-deploy\",pod=~\".*taskmanager.*\"})",
              "legendFormat": "{{phase}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "gradientMode": "none",
                "spanNulls": false,
                "stacking": { "mode": "normal", "group": "A" }
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },

        {
          "id": 500,
          "type": "row",
          "title": "Autopilot Insights",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 44, "w": 24, "h": 1 }
        },

        {
          "id": 11,
          "title": "Pod Startup Latency",
          "type": "timeseries",
          "description": "Seconds from pod creation to readiness for TM pods in `vvp`. A shorter latency means Autopilot can react faster to load spikes.",
          "gridPos": { "x": 0, "y": 45, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "kube_pod_status_ready_time{namespace=\"vvp-deploy\",pod=~\".*taskmanager.*\"} - kube_pod_created{namespace=\"vvp-deploy\",pod=~\".*taskmanager.*\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 5,
                "gradientMode": "none",
                "spanNulls": true
              },
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull"] }
          }
        },

        {
          "id": 12,
          "title": "End-to-End Watermark Lag",
          "type": "timeseries",
          "description": "Difference between event-time watermark and wall-clock time (negative = behind real-time). Deepening lag indicates processing cannot keep pace with ingestion.",
          "gridPos": { "x": 8, "y": 45, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "targets": [
            {
              "refId": "A",
