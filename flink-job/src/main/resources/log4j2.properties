# Log4j2 properties for the VVP3 Autopilot Showcase Flink job.
# Flink's log4j2 appender writes structured output that is forwarded by VVP3 to its log store.

# Root logger: INFO level, console appender (VVP3 captures stdout/stderr).
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

# Console appender — plain text, readable in VVP3 log viewer and kubectl logs.
appender.console.name = ConsoleAppender
appender.console.type = Console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n

# Silence noisy Flink internal loggers to reduce log volume.
logger.flink.name = org.apache.flink
logger.flink.level = INFO

logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN

logger.zookeeper.name = org.apache.zookeeper
logger.zookeeper.level = WARN

logger.netty.name = org.apache.flink.shaded.netty4
logger.netty.level = WARN

# Application logger at DEBUG level for development; switch to INFO in production.
logger.app.name = com.ververica.showcase
logger.app.level = INFO
