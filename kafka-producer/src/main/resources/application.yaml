server:
  port: 8888

producer:
  base-throughput: ${BASE_THROUGHPUT_MSG_SEC:500}
  peak-multiplier: ${PEAK_MULTIPLIER:10}
  peak-duration-seconds: ${PEAK_DURATION_SEC:300}
  ramp-up-seconds: ${RAMP_UP_SEC:30}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    topic: ${KAFKA_TOPIC_ORDERS:orders}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: kafka-producer
